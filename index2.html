<!DOCTYPE html>
<html lang="ar">
    <!-- eng ahmed raed 770936309 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Scanner</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
            direction: rtl !important;
        }

        video {
            width: 100%;
            max-width: 400px;
            border: 2px solid #000;
            border-radius: 10px;
        }

        #result2 {
            font-size: 14px;
            font-weight: bold;
            color: #000;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h3>قم بمسح الـ QR Code بالكاميرا</h3>

    <div style="display: flex; justify-content: center;">
        <h6 style="margin: 10px 5px;">اختر الكاميرا:</h6>
        <select id="cameraSelect"></select>
    </div>

    <video id="scanner" style="height: 380px; object-fit: cover;"></video>
    <a id="result2" style="direction: ltr;" href="#"></a>

    <script type="module">
        import QrScanner from "./js/qr-scanner.min.js";

        // قراءة الرابط الأساسي
        let sourcePage = new URLSearchParams(window.location.search).get("tthh");
        if (!sourcePage) {
            sourcePage = "http://a.com";
        }

        const video = document.getElementById('scanner');
        const resultText = document.getElementById('result2');

        const qrScanner = new QrScanner(
            video,
            result => {
                let input = result.data.trim();
                input = input.replace(/^-/, "");

                let username = "";
                let password = "";

                // 1️⃣ رابط URL
                let urlPattern = /[?&]username=([^&]+)(?:&password=([^?&]+))?/;
                
                // 2️⃣ صيغة # أو ?
                let simplePattern = /^([^#?]+)[#?](.+)$/;

                if (urlPattern.test(input)) {
                    let matches = input.match(urlPattern);
                    username = matches[1];
                    password = matches[2] || "";

                } else if (simplePattern.test(input)) {
                    let matches = input.match(simplePattern);
                    username = matches[1];
                    password = matches[2];

                } else {
                    console.log("❌ صيغة غير مدعومة:", input);
                    return;
                }

                let finalUrl = `${sourcePage}/login?username=${username}&password=${password}`;

                resultText.innerText = finalUrl;
                resultText.href = finalUrl;

                // تحويل مباشر
                window.location.href = finalUrl;
            },

            {
                facingMode: 'environment',
                highlightScanRegion: true,
                highlightCodeOutline: true,
                inversionMode: "both",
                inversionAttempts: "attemptBoth"
            }
        );

        // الكاميرات
        const cameraSelect = document.getElementById("cameraSelect");
        const cameras = await QrScanner.listCameras(true);

        cameras.forEach(camera => {
            const option = document.createElement("option");
            option.value = camera.id;
            option.textContent = camera.label;
            cameraSelect.appendChild(option);

            if (
                camera.label.toLowerCase().includes("back") ||
                camera.label.toLowerCase().includes("rear")
            ) {
                cameraSelect.value = camera.id;
                qrScanner.setCamera(camera.id);
            }
        });

        cameraSelect.addEventListener("change", e => {
            qrScanner.setCamera(e.target.value);
        });

        qrScanner.start();
    </script>

</body>
</html>
